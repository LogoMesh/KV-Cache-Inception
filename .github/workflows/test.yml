name: Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: set python version
        run: uv python install 3.13

      - name: install deps
        run: uv sync --dev

      - name: run tests
        run: uv run pytest tests/ -v --tb=short
